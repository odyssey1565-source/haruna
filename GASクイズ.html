<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAS 学習 & クイズ</title>
<style>
  :root {
    --primary: #4285f4;
    --success: #34a853;
    --danger: #ea4335;
    --warning: #fbbc04;
    --bg: #f8f9fa;
    --card: #ffffff;
    --text: #202124;
    --sub: #5f6368;
    --border: #e8eaed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--primary); color: #fff; padding: 14px 20px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.2); position: sticky; top: 0; z-index: 100;
  }
  header .logo { font-size: 22px; }
  header h1 { font-size: 18px; font-weight: 700; }
  header .sub { font-size: 12px; opacity: .8; }

  .container { max-width: 780px; margin: 0 auto; padding: 20px 16px 80px; }

  /* ===== MENU ===== */
  #screen-menu { animation: fadeIn .3s; }
  .menu-hero { text-align: center; padding: 24px 0 20px; }
  .menu-hero .big-icon { font-size: 56px; margin-bottom: 10px; }
  .menu-hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .menu-hero p { color: var(--sub); font-size: 14px; }

  .flow-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin: 16px 0 24px; flex-wrap: wrap;
  }
  .flow-chip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
  }
  .flow-arrow { color: var(--sub); font-size: 16px; }

  .level-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; }
  .level-card {
    background: var(--card); border-radius: 14px; padding: 20px 16px;
    text-align: center; cursor: pointer; border: 2px solid var(--border);
    transition: transform .15s, box-shadow .15s, border-color .15s;
  }
  .level-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,.1); border-color: var(--primary); }
  .level-card .lv-icon { font-size: 36px; margin-bottom: 8px; }
  .level-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .level-card .lv-desc { font-size: 12px; color: var(--sub); margin-bottom: 10px; line-height: 1.5; }
  .lv-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .lv-1 .lv-badge { background: #e8f5e9; color: #2e7d32; }
  .lv-2 .lv-badge { background: #fff3e0; color: #e65100; }
  .lv-3 .lv-badge { background: #fce4ec; color: #c62828; }
  .lv-4 .lv-badge { background: #ede7f6; color: #4527a0; }
  .lv-prog { font-size: 11px; color: var(--sub); margin-top: 8px; }
  .mini-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .mini-bar .fill { height: 100%; background: var(--success); border-radius: 2px; transition: width .4s; }

  /* ===== LESSON LIST ===== */
  #screen-lessons { animation: fadeIn .3s; }
  .screen-hd { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .btn-back {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; cursor: pointer; font-size: 13px; color: var(--sub);
    display: flex; align-items: center; gap: 4px;
  }
  .btn-back:hover { background: var(--border); }
  .screen-title { font-size: 20px; font-weight: 700; }

  .lesson-list { display: flex; flex-direction: column; gap: 10px; }
  .lesson-row {
    background: var(--card); border-radius: 12px; padding: 16px;
    display: flex; align-items: center; gap: 14px; cursor: pointer;
    border: 2px solid var(--border); transition: border-color .15s, box-shadow .15s;
    position: relative;
  }
  .lesson-row:hover { border-color: var(--primary); box-shadow: 0 2px 12px rgba(66,133,244,.15); }
  .lesson-row.done { border-color: var(--success); }
  .lesson-row.locked { opacity: .5; cursor: not-allowed; }
  .lesson-row.locked:hover { border-color: var(--border); box-shadow: none; }
  .lesson-num {
    width: 38px; height: 38px; border-radius: 50%; background: #e8f0fe;
    color: var(--primary); font-weight: 700; font-size: 15px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .lesson-row.done .lesson-num { background: var(--success); color: #fff; }
  .lesson-row.locked .lesson-num { background: var(--border); color: var(--sub); }
  .lesson-info { flex: 1; }
  .lesson-info .li-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .lesson-info .li-meta { font-size: 12px; color: var(--sub); display: flex; align-items: center; gap: 8px; }
  .li-tag { background: #e8f0fe; color: var(--primary); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .li-quiz-badge { background: #e8f5e9; color: var(--success); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .li-quiz-badge.pending { background: #fff3e0; color: #e65100; }
  .lesson-arrow { color: var(--sub); font-size: 18px; }

  /* ===== LESSON ===== */
  #screen-lesson { animation: fadeIn .3s; }
  .lesson-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .lesson-prog { font-size: 13px; color: var(--sub); }

  .lesson-card {
    background: var(--card); border-radius: 16px; padding: 26px 22px;
    border: 1px solid var(--border); margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .lesson-tag-top { display: inline-block; background: #e8f0fe; color: var(--primary); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; }
  .lesson-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }

  .content-block { margin-bottom: 18px; }
  .content-block h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  .content-block p { font-size: 14px; line-height: 1.8; }
  .content-block p + p { margin-top: 8px; }
  .content-block ul { padding-left: 20px; }
  .content-block li { font-size: 14px; line-height: 1.8; margin-bottom: 3px; }
  code { background: #f1f3f4; padding: 2px 6px; border-radius: 4px; font-family: 'Fira Code','Consolas',monospace; font-size: 13px; color: #c62828; }
  .code-block {
    background: #282c34; color: #abb2bf; border-radius: 12px;
    padding: 16px; font-family: 'Fira Code','Consolas',monospace;
    font-size: 13px; line-height: 1.8; margin: 10px 0; overflow-x: auto; white-space: pre;
  }
  .code-block .kw  { color: #c678dd; }
  .code-block .fn  { color: #61afef; }
  .code-block .str { color: #98c379; }
  .code-block .num { color: #d19a66; }
  .code-block .cm  { color: #7d8799; font-style: italic; }
  .code-block .cls { color: #e5c07b; }
  .tip-box { background: #fff8e1; border-left: 4px solid var(--warning); border-radius: 0 10px 10px 0; padding: 12px 16px; margin: 12px 0; }
  .tip-box .tip-title { font-size: 13px; font-weight: 700; color: #f57f17; margin-bottom: 5px; }
  .tip-box p { font-size: 13px; line-height: 1.7; color: #5d4037; }
  .info-box { background: #e8f4fd; border-left: 4px solid var(--primary); border-radius: 0 10px 10px 0; padding: 12px 16px; margin: 12px 0; }
  .info-box .info-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
  .info-box p { font-size: 13px; line-height: 1.7; color: #1565c0; }

  .btn-to-quiz {
    width: 100%; padding: 16px; background: var(--primary); color: #fff;
    border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: background .15s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-to-quiz:hover { background: #1a73e8; transform: translateY(-1px); }

  /* ===== QUIZ ===== */
  #screen-quiz { animation: fadeIn .3s; }
  .quiz-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .quiz-meta { text-align: right; }
  .quiz-meta .qm-lesson { font-size: 12px; color: var(--sub); }
  .quiz-meta .qm-count { font-size: 15px; font-weight: 700; }

  .prog-wrap { margin-bottom: 18px; }
  .prog-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .4s; }
  .prog-txt { font-size: 12px; color: var(--sub); margin-top: 4px; }

  .q-card {
    background: var(--card); border-radius: 14px; padding: 22px;
    margin-bottom: 14px; border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .q-cat { display: inline-block; background: #e8f0fe; color: var(--primary); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
  .q-text { font-size: 16px; font-weight: 600; line-height: 1.6; margin-bottom: 14px; }
  .q-code { background: #282c34; color: #abb2bf; border-radius: 10px; padding: 14px; font-family: 'Fira Code','Consolas',monospace; font-size: 13px; line-height: 1.7; margin-bottom: 14px; overflow-x: auto; white-space: pre; }
  .q-code .kw{color:#c678dd;} .q-code .fn{color:#61afef;} .q-code .str{color:#98c379;} .q-code .num{color:#d19a66;} .q-code .cm{color:#7d8799;font-style:italic;} .q-code .cls{color:#e5c07b;}

  .choices { display: flex; flex-direction: column; gap: 9px; }
  .choice-btn {
    background: var(--bg); border: 2px solid var(--border); border-radius: 11px;
    padding: 13px 16px; text-align: left; cursor: pointer; font-size: 14px;
    font-family: inherit; color: var(--text);
    transition: border-color .15s, background .15s, transform .1s;
    display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--primary); background: #e8f0fe; transform: translateX(3px); }
  .clabel { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-top: 1px; }
  .choice-btn.correct { border-color: var(--success); background: #e8f5e9; }
  .choice-btn.correct .clabel { background: var(--success); color: #fff; }
  .choice-btn.wrong { border-color: var(--danger); background: #fce8e6; }
  .choice-btn.wrong .clabel { background: var(--danger); color: #fff; }
  .choice-btn:disabled { cursor: default; }

  .exp-box {
    background: var(--card); border-radius: 12px; padding: 16px;
    margin-bottom: 14px; border-left: 4px solid var(--primary);
    display: none; animation: fadeIn .3s;
  }
  .exp-box.show { display: block; }
  .exp-ttl { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 7px; }
  .exp-body { font-size: 14px; line-height: 1.7; }
  .exp-res { margin-top: 10px; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .exp-res.ok { background: #e8f5e9; color: #2e7d32; }
  .exp-res.ng { background: #fce8e6; color: #c62828; }

  .btn-next-q {
    width: 100%; padding: 14px; background: var(--primary); color: #fff;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
    cursor: pointer; display: none; font-family: inherit; transition: background .15s;
  }
  .btn-next-q:hover { background: #1a73e8; }
  .btn-next-q.show { display: block; }

  /* ===== LESSON RESULT ===== */
  #screen-lresult { animation: fadeIn .3s; }
  .lresult-card {
    background: var(--card); border-radius: 20px; padding: 36px 24px;
    text-align: center; border: 1px solid var(--border);
    box-shadow: 0 4px 16px rgba(0,0,0,.08); margin-bottom: 16px;
  }
  .lr-icon { font-size: 60px; margin-bottom: 12px; }
  .lr-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .lr-sub { color: var(--sub); font-size: 14px; margin-bottom: 20px; }
  .score-ring {
    width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 8px solid var(--primary); background: #e8f0fe;
  }
  .score-ring .sr-num { font-size: 34px; font-weight: 900; color: var(--primary); }
  .score-ring .sr-tot { font-size: 13px; color: var(--sub); }
  .lr-comment { background: var(--bg); border-radius: 12px; padding: 14px; font-size: 14px; line-height: 1.7; color: var(--sub); margin-bottom: 20px; text-align: left; }
  .lr-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-primary { padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { background: #1a73e8; }
  .btn-secondary { padding: 13px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-secondary:hover { background: var(--border); }

  .review-wrap { margin-top: 16px; }
  .rv-item { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
  .rv-q { font-size: 14px; font-weight: 600; margin-bottom: 7px; }
  .rv-ans { font-size: 13px; padding: 5px 10px; border-radius: 7px; margin-bottom: 3px; }
  .rv-ok { background: #e8f5e9; color: #2e7d32; }
  .rv-ng { background: #fce8e6; color: #c62828; }
  .rv-exp { font-size: 13px; color: var(--sub); margin-top: 7px; line-height: 1.6; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .hidden { display: none !important; }
  @media (max-width: 480px) {
    .level-grid { grid-template-columns: 1fr 1fr; }
    .lesson-card { padding: 18px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <div>
    <h1>GAS 学習 &amp; クイズ</h1>
    <div class="sub">Google Apps Script をスモールステップで習得</div>
  </div>
</header>

<div class="container">

  <!-- メニュー -->
  <div id="screen-menu">
    <div class="menu-hero">
      <div class="big-icon">📚</div>
      <h2>1レッスン → 1クイズ で着実に習得</h2>
      <p>解説を読んだらすぐにクイズで確認！</p>
    </div>
    <div class="flow-bar">
      <div class="flow-chip">📖 レッスンを読む</div>
      <div class="flow-arrow">→</div>
      <div class="flow-chip">✍️ その場でクイズ</div>
      <div class="flow-arrow">→</div>
      <div class="flow-chip">✅ 理解して次へ</div>
    </div>
    <div class="level-grid">
      <div class="level-card lv-1" onclick="openLevel(0)">
        <div class="lv-icon">🌱</div><h3>Level 1</h3>
        <div class="lv-desc">GASの基本<br>変数・関数・ループ</div>
        <span class="lv-badge">入門</span>
        <div class="lv-prog" id="lp0"></div>
        <div class="mini-bar"><div class="fill" id="lf0" style="width:0%"></div></div>
      </div>
      <div class="level-card lv-2" onclick="openLevel(1)">
        <div class="lv-icon">📊</div><h3>Level 2</h3>
        <div class="lv-desc">スプレッドシート<br>操作の基本</div>
        <span class="lv-badge">初級</span>
        <div class="lv-prog" id="lp1"></div>
        <div class="mini-bar"><div class="fill" id="lf1" style="width:0%"></div></div>
      </div>
      <div class="level-card lv-3" onclick="openLevel(2)">
        <div class="lv-icon">📧</div><h3>Level 3</h3>
        <div class="lv-desc">Gmail・Drive<br>外部連携</div>
        <span class="lv-badge">中級</span>
        <div class="lv-prog" id="lp2"></div>
        <div class="mini-bar"><div class="fill" id="lf2" style="width:0%"></div></div>
      </div>
      <div class="level-card lv-4" onclick="openLevel(3)">
        <div class="lv-icon">⏱️</div><h3>Level 4</h3>
        <div class="lv-desc">トリガー・Webアプリ<br>応用テクニック</div>
        <span class="lv-badge">上級</span>
        <div class="lv-prog" id="lp3"></div>
        <div class="mini-bar"><div class="fill" id="lf3" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- レッスン一覧 -->
  <div id="screen-lessons" class="hidden">
    <div class="screen-hd">
      <button class="btn-back" onclick="goMenu()">← 戻る</button>
      <div class="screen-title" id="lessons-title"></div>
    </div>
    <div class="lesson-list" id="lesson-list"></div>
  </div>

  <!-- レッスン本文 -->
  <div id="screen-lesson" class="hidden">
    <div class="lesson-hd">
      <button class="btn-back" onclick="goLessons()">← 一覧へ</button>
      <div class="lesson-prog" id="lesson-prog"></div>
    </div>
    <div id="lesson-content"></div>
    <button class="btn-to-quiz" onclick="startLessonQuiz()">✍️ クイズに挑戦！</button>
  </div>

  <!-- クイズ -->
  <div id="screen-quiz" class="hidden">
    <div class="quiz-hd">
      <button class="btn-back" onclick="backToLesson()">← 解説に戻る</button>
      <div class="quiz-meta">
        <div class="qm-lesson" id="qm-lesson"></div>
        <div class="qm-count" id="qm-count"></div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill-q"></div></div>
      <div class="prog-txt" id="prog-txt-q"></div>
    </div>
    <div class="q-card">
      <div class="q-cat" id="q-cat"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-code hidden" id="q-code"></div>
      <div class="choices" id="choices"></div>
    </div>
    <div class="exp-box" id="exp-box">
      <div class="exp-ttl">💡 解説</div>
      <div class="exp-body" id="exp-body"></div>
      <div class="exp-res" id="exp-res"></div>
    </div>
    <button class="btn-next-q" id="btn-next-q" onclick="nextQ()">次の問題へ →</button>
  </div>

  <!-- レッスン結果 -->
  <div id="screen-lresult" class="hidden">
    <div class="lresult-card">
      <div class="lr-icon" id="lr-icon"></div>
      <div class="lr-title" id="lr-title"></div>
      <div class="lr-sub" id="lr-sub"></div>
      <div class="score-ring">
        <div class="sr-num" id="sr-num"></div>
        <div class="sr-tot" id="sr-tot"></div>
      </div>
      <div class="lr-comment" id="lr-comment"></div>
      <div class="lr-actions">
        <button class="btn-primary" id="btn-next-lesson" onclick="goNextLesson()"></button>
        <button class="btn-secondary" onclick="retryQuiz()">🔄 このクイズをやり直す</button>
        <button class="btn-secondary" onclick="showReview()">📖 解答を見直す</button>
        <button class="btn-secondary" onclick="backToLesson()">📖 解説を読み直す</button>
        <button class="btn-secondary" onclick="goLessons()">📋 一覧へ戻る</button>
      </div>
    </div>
    <div class="review-wrap hidden" id="review-wrap"></div>
  </div>

</div>

<script>
// ============================================================
// データ: レッスン + 直結クイズ（各2〜3問）
// ============================================================
const LEVELS = [
  { name: 'Level 1 — GASの基本', short: 'Lv.1' },
  { name: 'Level 2 — スプレッドシート', short: 'Lv.2' },
  { name: 'Level 3 — Gmail・Drive連携', short: 'Lv.3' },
  { name: 'Level 4 — トリガー・応用', short: 'Lv.4' },
];

const LESSONS = [
 /* ── Level 1 ── */
 [
  {
   tag:'GAS概要', title:'GASとは何か？',
   content:`
    <div class="content-block"><h3>🔍 GASとは？</h3>
    <p>Google Apps Script（GAS）は、Googleが提供する<strong>クラウドベースのスクリプト実行環境</strong>です。</p>
    <p><strong>JavaScript</strong> をベースにした言語で、スプレッドシート・Gmail・Drive などを自動化できます。</p></div>
    <div class="info-box"><div class="info-title">💡 GASのメリット</div>
    <p>・環境構築不要。ブラウザだけで書ける<br>・Googleサービスと簡単に連携<br>・トリガーで自動実行できる<br>・無料で使える</p></div>
    <div class="content-block"><h3>📝 最初のGASコード</h3>
    <p>スプレッドシートを開き「拡張機能 → Apps Script」でエディタを開きます。</p></div>
    <div class="code-block"><span class="kw">function</span> <span class="fn">myFunction</span>() {
  <span class="cls">Logger</span>.<span class="fn">log</span>(<span class="str">"Hello, GAS!"</span>);
}</div>

let curLevel = 0;

let curQuestions = [];
let curQuizIdx = 0;
let curScore = 0;
let curAnswers = [];

const prog = JSON.parse(localStorage.getItem('gasLessonProg') || '{}');
function getP(lv) {
  if (!prog[lv]) prog[lv] = { done: [] };
  return prog[lv];
}
function saveP() { localStorage.setItem('gasLessonProg', JSON.stringify(prog)); }

// ============================================================
// 画面切替
// ============================================================
const SCREENS = ['screen-menu','screen-lessons','screen-lesson','screen-quiz','screen-lresult'];
function show(id) {
  SCREENS.forEach(s => document.getElementById(s).classList.toggle('hidden', s !== id));
  window.scrollTo(0, 0);
}

// ============================================================
// メニュー
// ============================================================
function renderMenu() {
  LESSONS.forEach((lv, i) => {
    const done = getP(i).done.length;
    const total = lv.length;
    const pct = Math.round(done / total * 100);
    document.getElementById(`lf${i}`).style.width = pct + '%';
    document.getElementById(`lp${i}`).textContent = `${done}/${total} 完了`;
  });
}
function goMenu() { renderMenu(); show('screen-menu'); }

// ============================================================
// レッスン一覧
// ============================================================
function openLevel(lv) {
  curLevel = lv;
  renderLessonList();
  show('screen-lessons');
}
function goLessons() { renderLessonList(); show('screen-lessons'); }

function renderLessonList() {
  document.getElementById('lessons-title').textContent = LEVELS[curLevel].name;
  const p = getP(curLevel);
  document.getElementById('lesson-list').innerHTML = LESSONS[curLevel].map((l, i) => {
    const done = p.done.includes(i);
    const locked = i > 0 && !p.done.includes(i - 1);
    return `
      <div class="lesson-row ${done?'done':''} ${locked?'locked':''}"
           onclick="${locked ? "alert('前のレッスンをクリアしてください！')" : `openLesson(${i})`}">
        <div class="lesson-num">${done ? '✓' : locked ? '🔒' : i+1}</div>
        <div class="lesson-info">
          <div class="li-title">${l.title}</div>
          <div class="li-meta">
            <span class="li-tag">${l.tag}</span>
            <span class="li-quiz-badge ${done?'':'pending'}">${done ? '✅ クリア' : `✍️ ${l.quiz.length}問`}</span>
          </div>
        </div>
        <div class="lesson-arrow">${locked ? '' : '›'}</div>
      </div>`;
  }).join('');
}

// ============================================================
// レッスン本文
// ============================================================
function openLesson(idx) {
  curLessonIdx = idx;
  renderLesson();
  show('screen-lesson');
}
function backToLesson() { renderLesson(); show('screen-lesson'); }

function renderLesson() {
  const l = LESSONS[curLevel][curLessonIdx];
  const total = LESSONS[curLevel].length;
  document.getElementById('lesson-prog').textContent = `${curLessonIdx + 1} / ${total}`;
  document.getElementById('lesson-content').innerHTML = `
    <div class="lesson-card">
      <div class="lesson-tag-top">${l.tag}</div>
      <h2>${l.title}</h2>
      ${l.content}
    </div>`;
}

// ============================================================
// クイズ開始
// ============================================================
function startLessonQuiz() {
  const l = LESSONS[curLevel][curLessonIdx];
  curQuestions = [...l.quiz];
  curQuizIdx = 0;
  curScore = 0;
  curAnswers = [];

  document.getElementById('qm-lesson').textContent = `${LEVELS[curLevel].short} — ${l.title}`;
  show('screen-quiz');
  renderQ();
}

function renderQ() {
  const q = curQuestions[curQuizIdx];
  const total = curQuestions.length;
  const pct = (curQuizIdx / total) * 100;
  document.getElementById('prog-fill-q').style.width = pct + '%';
  document.getElementById('prog-txt-q').textContent = `問 ${curQuizIdx + 1} / ${total}`;
  document.getElementById('qm-count').textContent = `${curQuizIdx + 1} / ${total}`;
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').innerHTML = q.text;

  const codeEl = document.getElementById('q-code');
  if (q.code) { codeEl.innerHTML = q.code; codeEl.classList.remove('hidden'); }
  else { codeEl.classList.add('hidden'); }

  document.getElementById('choices').innerHTML = q.choices.map((c, i) => `
    <button class="choice-btn" onclick="selectAns(${i})">
      <span class="clabel">${'ABCD'[i]}</span><span>${c}</span>
    </button>`).join('');

  document.getElementById('exp-box').classList.remove('show');
  document.getElementById('btn-next-q').classList.remove('show');
}

function selectAns(sel) {
  const q = curQuestions[curQuizIdx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  const ok = sel === q.answer;
  if (ok) curScore++;
  btns[sel].classList.add(ok ? 'correct' : 'wrong');
  if (!ok) btns[q.answer].classList.add('correct');
  curAnswers.push({ q, sel, ok });

  document.getElementById('exp-body').innerHTML = q.exp;
  const res = document.getElementById('exp-res');
  res.className = 'exp-res ' + (ok ? 'ok' : 'ng');
  res.innerHTML = ok ? '✅ 正解！' : `❌ 不正解。正解は「${q.choices[q.answer]}」`;
  document.getElementById('exp-box').classList.add('show');

  const nb = document.getElementById('btn-next-q');
  nb.textContent = curQuizIdx < curQuestions.length - 1 ? '次の問題へ →' : '結果を見る';
  nb.classList.add('show');
}

function nextQ() {
  curQuizIdx++;
  if (curQuizIdx < curQuestions.length) renderQ();
  else showLessonResult();
}

// ============================================================
// レッスン結果
// ============================================================
function showLessonResult() {
  const total = curQuestions.length;
  const pct = Math.round(curScore / total * 100);
  const l = LESSONS[curLevel][curLessonIdx];

  let icon, title, comment;
  if (pct === 100) {
    icon='🏆'; title='パーフェクト！';
    comment='全問正解！このレッスンの内容をしっかり理解できています。次のレッスンへ進みましょう！';
    markDone();
  } else if (pct >= 50) {
    icon='😊'; title='もう少し！';
    comment='惜しい！解説をもう一度読んで、再チャレンジしてみましょう。';
  } else {
    icon='📖'; title='もう一度確認しよう';
    comment='解説をじっくり読み直してから再挑戦してみてください。';
  }

  document.getElementById('lr-icon').textContent = icon;
  document.getElementById('lr-title').textContent = title;
  document.getElementById('lr-sub').textContent = `${l.title} のクイズ結果`;
  document.getElementById('sr-num').textContent = curScore;
  document.getElementById('sr-tot').textContent = `/ ${total} 問`;
  document.getElementById('lr-comment').textContent = comment;

  // 次レッスンボタン
  const nextIdx = curLessonIdx + 1;
  const hasNext = nextIdx < LESSONS[curLevel].length;
  const nb = document.getElementById('btn-next-lesson');
  if (pct === 100 && hasNext) {
    nb.textContent = `次のレッスンへ → ${LESSONS[curLevel][nextIdx].title}`;
    nb.style.display = 'block';
  } else if (pct === 100 && !hasNext) {
    nb.textContent = '🎉 このレベルをクリア！一覧へ';
    nb.style.display = 'block';
  } else {
    nb.style.display = 'none';
  }

  document.getElementById('review-wrap').classList.add('hidden');
  show('screen-lresult');
}

function markDone() {
  const p = getP(curLevel);
  if (!p.done.includes(curLessonIdx)) {
    p.done.push(curLessonIdx);
    saveP();
  }
}

function goNextLesson() {
  const nextIdx = curLessonIdx + 1;
  if (nextIdx < LESSONS[curLevel].length) {
    openLesson(nextIdx);
  } else {
    goLessons();
  }
}

function retryQuiz() {
  document.getElementById('review-wrap').classList.add('hidden');
  startLessonQuiz();
}

function showReview() {
  const rw = document.getElementById('review-wrap');
  rw.classList.toggle('hidden');
  if (!rw.classList.contains('hidden')) {
    rw.innerHTML = '<h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">📖 解答の見直し</h3>' +
      curAnswers.map((a, i) => `
        <div class="rv-item">
          <div class="rv-q">Q${i+1}. ${a.q.text}</div>
          <div class="rv-ans ${a.ok?'rv-ok':'rv-ng'}">${a.ok?'✅':'❌'} あなたの回答: ${a.q.choices[a.sel]}</div>
          ${!a.ok ? `<div class="rv-ans rv-ok">正解: ${a.q.choices[a.q.answer]}</div>` : ''}
          <div class="rv-exp">${a.q.exp}</div>
        </div>`).join('');
  }
}

// 初期化
renderMenu();
</script>
</body>
</html>
